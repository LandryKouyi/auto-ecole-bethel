# Blueprint Render — Auto-École Lambaréné
# Plan GRATUIT (free) : pas de disque persistant → la base SQLite est éphémère et
# remise à zéro à chaque redémarrage/veille. L'app se re-seed automatiquement au
# démarrage (admin + données de démo), donc elle reste fonctionnelle comme DÉMO.
# ➡️ Pour conserver les données réelles, passer en plan `starter` + bloc `disk`
#    (voir docs/MIGRATION_RENDER_PAYANT.md).
services:
  - type: web
    name: auto-ecole-lambarene
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/sante
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: DB_PATH
        value: ./data/autoecole.db   # éphémère sur le free tier (pas de disque)
      - key: JWT_SECRET
        generateValue: true          # généré une fois par Render
      - key: ADMIN_EMAIL
        sync: false                  # à saisir dans le dashboard Render
      - key: ADMIN_PASSWORD
        sync: false                  # à saisir dans le dashboard Render (secret)
      - key: PUBLIC_URL
        sync: false                  # ex: https://auto-ecole-lambarene.onrender.com
      # --- E-Billing / SHAP (Mobile Money Gabon) : à saisir quand disponible ---
      - key: EBILLING_USERNAME
        sync: false
      - key: EBILLING_SHARED_KEY
        sync: false
